<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Глобальный поиск информации</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>🌐 Глобальный поиск</h1>
    <p>Введите ФИО, телефон или email — найдём всё, что есть в открытых источниках</p>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Иванов Иван, +7 916 123-45-67, email@example.com">
      <button id="searchBtn">Искать</button>
    </div>
    <div id="status" class="status">⏳ Введите запрос</div>
    <div id="results" class="results"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
